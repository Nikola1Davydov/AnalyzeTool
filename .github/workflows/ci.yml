name: CI

# Guardrails of the platform split (see src/build/Check-Boundaries.ps1 and samples/Acme.Sample):
#   1. dependency contract + headless Core/Tools invariant
#   2. the full plugin chain compiles for both TFM worlds (R25 = net8, R27 = net10)
#   3. the Sdk NUPKG works for an external extension author (pack -> build sample against it)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  build:
    name: Build + guardrails
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (8 + 10)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}

      - name: Dependency contract (boundaries + headless Core)
        shell: pwsh
        run: ./src/build/Check-Boundaries.ps1

      - name: Build plugin chain (Debug R25, net8)
        run: dotnet build "src/AnalyseTool.Launcher/AnalyseTool.Launcher.csproj" -c "Debug R25"

      - name: Build plugin chain (Debug R27, net10)
        run: dotnet build "src/AnalyseTool.Launcher/AnalyseTool.Launcher.csproj" -c "Debug R27"

      - name: Pack AnalyseTool.Sdk
        run: dotnet pack "src/AnalyseTool.Sdk/AnalyseTool.Sdk.csproj" -c "Release R25" -o artifacts/sdk-nupkg

      - name: Build Acme.Sample against the packed SDK (external-author simulation)
        shell: pwsh
        run: |
          $pkg = Get-ChildItem artifacts/sdk-nupkg/AnalyseTool.Sdk.*.nupkg | Select-Object -First 1
          $version = $pkg.Name -replace '^AnalyseTool\.Sdk\.', '' -replace '\.nupkg$', ''
          Write-Host "Packed SDK version: $version"

          $feed = (Resolve-Path artifacts/sdk-nupkg).Path
          $cfg = '<?xml version="1.0" encoding="utf-8"?><configuration><packageSources><clear />' +
                 "<add key=""local-sdk"" value=""$feed"" />" +
                 '<add key="nuget.org" value="https://api.nuget.org/v3/index.json" />' +
                 '</packageSources></configuration>'
          Set-Content nuget.ci.config $cfg -Encoding utf8

          # Isolated package folder so the ProjectReference world cannot leak into this restore.
          dotnet build samples/Acme.Sample/Acme.Sample.csproj -c "Release R25" `
            -p:UseSdkPackage=true `
            -p:SdkPackageVersion=$version `
            -p:RestoreConfigFile="$PWD/nuget.ci.config" `
            -p:RestorePackagesPath="$PWD/artifacts/sample-packages"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Upload SDK package artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-nupkg
          path: artifacts/sdk-nupkg/*.nupkg
